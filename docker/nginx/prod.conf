# Production nginx — serve SPA (frontend/dist) + proxy /api/* ke Laravel via PHP-FPM
server {
    listen 80;
    server_name _;
    client_max_body_size 20M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    server_tokens off;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Default root → SPA bundle
    root /var/www/frontend;
    index index.html;

    # ===== Backend API =====
    # Semua request /api/* dan /up diproses oleh Laravel.
    # alias mengganti document root ke /var/www/html/public agar index.php
    # ditemukan saat di-rewrite.
    location ~ ^/(api|up) {
        root /var/www/html/public;
        try_files $uri /index.php?$query_string;
    }

    # PHP-FPM untuk index.php (Laravel) — hanya untuk request yg di-rewrite dari atas.
    location ~ \.php$ {
        root /var/www/html/public;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # ===== Frontend SPA =====
    # Asset hash-named (vite output: assets/index-abc123.js) → cache 1 tahun
    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html — JANGAN cache (kecil, butuh selalu fresh agar referensi
    # ke chunk JS/CSS hash-named selalu yg terbaru). Tanpa ini, browser bisa
    # serve index.html lama → 404 saat fetch chunk yg sudah dihapus deploy baru
    # → SPA crash di ErrorBoundary.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        expires off;
    }

    # Semua route lain → index.html (SPA history fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block dotfiles
    location ~ /\. {
        deny all;
        access_log off;
    }
}
